<!DOCTYPE html>
<html>
<head>
    <title>NANO-NET</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        /* ========== СВЕТЛАЯ ТЕМА ========== */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'VT323', 'Courier New', monospace;
            background: linear-gradient(135deg, #f0e6ff 0%, #ffe6f0 50%, #e6f0ff 100%);
            min-height: 100vh;
            padding: 10px;
            position: relative;
        }

        /* НЯШНЫЕ ПУЗЫРЬКИ */
        .bubble {
            position: fixed;
            background: radial-gradient(circle at 30% 30%, rgba(255, 200, 255, 0.6), rgba(200, 180, 255, 0.3));
            border-radius: 50%;
            filter: blur(2px);
            animation: float 20s infinite ease-in-out;
            z-index: 0;
            opacity: 0.4;
        }

        .bubble1 { width: 200px; height: 200px; top: 5%; left: -5%; animation-delay: 0s; }
        .bubble2 { width: 250px; height: 250px; bottom: 10%; right: -10%; animation-delay: 5s; background: radial-gradient(circle, #ffe6ff, #ffd9e6); }
        .bubble3 { width: 150px; height: 150px; top: 40%; right: 5%; animation-delay: 10s; }
        .bubble4 { width: 300px; height: 300px; bottom: 5%; left: 10%; animation-delay: 15s; opacity: 0.2; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -20px) rotate(5deg); }
            50% { transform: translate(-10px, 30px) rotate(-5deg); }
            75% { transform: translate(-20px, -10px) rotate(3deg); }
        }

        /* ОСНОВНОЙ ЭКРАН */
        .screen {
            max-width: 600px;
            margin: 10px auto;
            background: rgba(255, 245, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 3px solid #c2a5ff;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 0 30px #d9b5ff, inset 0 0 20px #ffe6ff, 5px 5px 0 #b385ff;
            position: relative;
            z-index: 10;
        }

        /* ТЕКСТ */
        h1, h2, h3 {
            font-family: 'Press Start 2P', cursive;
            color: #7a4d9e;
            text-shadow: 2px 2px 0 #d9b5ff;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* ПОЛЯ ВВОДА */
        .input-field {
            width: 100%;
            padding: 15px 20px;
            background: white;
            border: 3px solid #c2a5ff;
            color: #4a2c64;
            font-family: 'VT323', monospace;
            font-size: 20px;
            border-radius: 50px;
            outline: none;
            margin: 8px 0;
            box-shadow: inset 2px 2px 5px #e6d9ff;
        }

        .input-field:focus {
            border-color: #a66aff;
            box-shadow: 0 0 20px #c285ff;
        }

        /* КНОПКИ */
        .btn {
            background: linear-gradient(135deg, #d9b5ff, #b585ff);
            border: none;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            padding: 15px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
            text-align: center;
            box-shadow: 0 5px 0 #7a4d9e, 0 0 15px #d9b5ff;
            transition: 0.1s;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #7a4d9e, 0 0 20px #f0c5ff;
        }

        .btn.small {
            font-size: 10px;
            padding: 10px;
        }

        /* АВАТАР */
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 10px auto;
            border: 5px solid #c2a5ff;
            overflow: hidden;
            background: white;
            box-shadow: 0 0 30px #d9b5ff;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-preview .placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ffe6ff, #e6d9ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #a66aff;
        }

        /* ШАПКА */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 3px solid #d9b5ff;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .header-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #c285ff;
            overflow: hidden;
        }

        .header-info {
            flex: 1;
        }

        .header-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #4a2c64;
        }

        .header-status {
            font-size: 14px;
            color: #8855aa;
        }

        /* СПИСОК ЧАТОВ */
        .chats-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #7a4d9e;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 235, 255, 0.7);
            border: 2px solid #d9b5ff;
            border-radius: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item:hover {
            background: #ffe6ff;
            border-color: #b573ff;
        }

        .chat-item.active {
            background: #f0d9ff;
            border-color: #a66aff;
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #c285ff;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #4a2c64;
        }

        .chat-last {
            font-size: 14px;
            color: #7a4d9e;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-actions {
            display: flex;
            gap: 5px;
        }

        .chat-actions span {
            font-size: 18px;
            opacity: 0.5;
            transition: 0.2s;
        }

        .chat-actions span:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        /* ПОИСК */
        .search-section {
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: white;
            border: 3px solid #d9b5ff;
            border-radius: 40px;
            font-family: 'VT323', monospace;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
        }

        .user-result {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f0e6ff;
            border-radius: 15px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .user-result:hover {
            background: #ffe6ff;
        }

        /* ОКНО ЧАТА */
        .messages-container {
            background: white;
            border: 3px solid #d9b5ff;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }

        .messages-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e6d9ff;
            margin-bottom: 10px;
        }

        #messages {
            height: 350px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 15px;
        }

        /* СООБЩЕНИЯ */
        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 18px;
            position: relative;
        }

        .message.my-message {
            background: linear-gradient(135deg, #d9b5ff, #c7a0ff);
            color: #2c1a3b;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .message.other-message {
            background: #f5eaff;
            color: #2c1a3b;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .message .time {
            font-size: 10px;
            color: #8855aa;
            display: block;
            margin-top: 5px;
        }

        .message .status {
            font-size: 10px;
            float: right;
        }

        .message .status.sent { color: #aaa; }
        .message .status.delivered { color: #7a4d9e; }
        .message .status.read { color: #4caf50; }

        .message .reactions {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .message .reaction {
            background: white;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .message .reply {
            background: rgba(255,255,255,0.3);
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-size: 12px;
            border-left: 3px solid #a66aff;
        }

        /* КОНТЕКСТНОЕ МЕНЮ */
        .context-menu {
            position: fixed;
            background: white;
            border: 3px solid #d9b5ff;
            border-radius: 15px;
            padding: 8px;
            z-index: 1000;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .context-menu-item {
            padding: 8px 15px;
            color: #4a2c64;
            cursor: pointer;
            border-radius: 10px;
            white-space: nowrap;
        }

        .context-menu-item:hover {
            background: #f0e6ff;
        }

        /* ИНПУТЫ */
        .message-input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 15px;
            background: white;
            border: 3px solid #d9b5ff;
            border-radius: 40px;
            font-family: 'VT323', monospace;
            font-size: 18px;
        }

        .media-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .media-btn {
            background: #f0e6ff;
            border: 2px solid #d9b5ff;
            color: #4a2c64;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .media-btn:hover {
            background: #e6d9ff;
        }

        .media-btn.recording {
            background: #ff9999;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 25px;
            max-width: 90%;
            width: 400px;
            border: 4px solid #d9b5ff;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #7a4d9e;
        }

        /* ГРУППЫ */
        .member-list {
            max-height: 200px;
            overflow-y: auto;
            background: #f5f0ff;
            border-radius: 15px;
            padding: 10px;
            margin: 10px 0;
        }

        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #e6d9ff;
        }

        /* СТАТУСЫ */
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .status-online { background: #4caf50; box-shadow: 0 0 10px #4caf50; }
        .status-offline { background: #999; }

        #typingIndicator {
            color: #7a4d9e;
            font-size: 14px;
            min-height: 20px;
        }

        /* СКРОЛЛ */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f0e6ff;
        }
        ::-webkit-scrollbar-thumb {
            background: #c285ff;
            border-radius: 10px;
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="bubble bubble1"></div>
    <div class="bubble bubble2"></div>
    <div class="bubble bubble3"></div>
    <div class="bubble bubble4"></div>

    <!-- КОНТЕКСТНОЕ МЕНЮ -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="replyToMessage()">💬 Ответить</div>
        <div class="context-menu-item" onclick="reactToMessage('❤️')">❤️</div>
        <div class="context-menu-item" onclick="reactToMessage('✨')">✨</div>
        <div class="context-menu-item" onclick="reactToMessage('👾')">👾</div>
        <div class="context-menu-item" onclick="deleteMessage()">🗑️ Удалить</div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ПРОФИЛЯ -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✎ ПРОФИЛЬ</h3>
                <span class="modal-close" onclick="hideProfileModal()">✕</span>
            </div>
            <div class="avatar-preview" id="modalAvatarPreview">
                <div class="placeholder" id="modalAvatarPlaceholder">✦</div>
                <img id="modalAvatarImage" style="display: none;">
            </div>
            <input type="text" id="modalUsername" class="input-field" placeholder="Имя">
            <textarea id="modalBio" class="input-field" placeholder="О себе" rows="3"></textarea>
            <div class="btn" onclick="document.getElementById('modalAvatarUpload').click()">СМЕНИТЬ АВАТАРКУ</div>
            <input type="file" id="modalAvatarUpload" accept="image/*" style="display: none;">
            <div class="btn" onclick="saveProfile()">СОХРАНИТЬ</div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ В ГРУППУ -->
    <div class="modal" id="addMemberModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ ДОБАВИТЬ В ГРУППУ</h3>
                <span class="modal-close" onclick="hideAddMemberModal()">✕</span>
            </div>
            <input type="text" id="memberSearch" class="input-field" placeholder="Поиск пользователей..." oninput="searchMembers()">
            <div class="member-list" id="memberSearchResults"></div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div class="screen" id="mainScreen">
        <!-- СТАРТОВЫЙ ЭКРАН -->
        <div id="startScreen">
            <h1 style="text-align: center;">✦ NANO-NET ✦</h1>
            <p style="text-align: center; color: #7a4d9e;">СОЗДАЙ ПРОФИЛЬ</p>

            <div class="avatar-preview" id="regAvatarPreview">
                <div class="placeholder" id="regAvatarPlaceholder">✦</div>
                <img id="regAvatarImage" style="display: none;">
            </div>
            <div class="btn small" onclick="document.getElementById('regAvatarUpload').click()">ЗАГРУЗИТЬ АВАТАРКУ</div>
            <input type="file" id="regAvatarUpload" accept="image/*" style="display: none;">

            <input type="text" id="regUsername" class="input-field" placeholder="ТВОЁ ИМЯ">
            <textarea id="regBio" class="input-field" placeholder="О ТЕБЕ" rows="3"></textarea>

            <div class="btn" onclick="register()">✦ ВОЙТИ ✦</div>
            <div id="errorMessage" style="color: #ff6666; text-align: center;"></div>
        </div>

        <!-- ОСНОВНОЙ ЧАТ -->
        <div id="mainChat" style="display: none;">
            <!-- ШАПКА -->
            <div class="chat-header" onclick="showProfileModal()">
                <div class="header-avatar" id="headerAvatar">
                    <div class="placeholder" id="headerPlaceholder">✦</div>
                    <img id="headerAvatarImage" style="display: none;">
                </div>
                <div class="header-info">
                    <div class="header-name" id="headerName">...</div>
                    <div class="header-status" id="headerStatus">● ONLINE</div>
                </div>
                <div style="font-size: 20px;">✎</div>
            </div>

            <!-- ПОИСК -->
            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 НАЙТИ ДРУГА..." oninput="searchUsers()">
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- СПИСОК ЧАТОВ -->
            <div class="chats-section">
                <div class="section-title">
                    ✦ ЛИЧНЫЕ ЧАТЫ ✦
                    <span style="font-size: 20px; cursor: pointer;" onclick="showCreateGroup()">➕</span>
                </div>
                <div id="privateChats"></div>
            </div>

            <div class="chats-section">
                <div class="section-title">✦ ГРУППОВЫЕ ЧАТЫ ✦</div>
                <div id="groupChats"></div>
            </div>

            <!-- ОКНО ЧАТА -->
            <div class="messages-container" id="messagesContainer" style="display: none;">
                <div class="messages-header" id="currentChatHeader">
                    <div class="chat-avatar" id="currentChatAvatar">
                        <div class="placeholder">✦</div>
                    </div>
                    <div>
                        <div class="header-name" id="currentChatName">...</div>
                        <div class="header-status" id="currentChatStatus"></div>
                    </div>
                </div>

                <div id="typingIndicator"></div>
                <div id="messages"></div>

                <div class="message-input-wrapper">
                    <input type="text" id="messageInput" placeholder="НАПИСАТЬ..." oninput="onTyping()">
                    <div class="media-btn" onclick="sendMessage()">➤</div>
                </div>

                <div class="media-buttons">
                    <div class="media-btn" onclick="sendPhoto()">📷 ФОТО</div>
                    <div class="media-btn" onclick="startAudioRecording()">🎤 ГОЛОС</div>
                    <div class="media-btn" onclick="sendFile()">📎 ФАЙЛ</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКА FIREBASE ==========
        const firebaseConfig = {
            databaseURL: "https://nanonet-b9b0d-default-rtdb.firebaseio.com" // ЗАМЕНИ НА СВОЮ ССЫЛКУ
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentUser = null;
        let currentUserData = null;
        let currentChatId = null;
        let currentChatType = null;
        let currentChatPartner = null;
        let selectedMessageId = null;
        let typingTimeout = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let audioStream = null;
        
        // ========== РЕГИСТРАЦИЯ ==========
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            if (!username) {
                showError('ВВЕДИ ИМЯ');
                return;
            }
            
            // Проверка уникальности ника
            database.ref('usernames/' + username.toLowerCase()).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    showError('ЭТО ИМЯ УЖЕ ЗАНЯТО');
                    return;
                }
                
                const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                const avatar = localStorage.getItem('tempAvatar') || '';
                const bio = document.getElementById('regBio').value || '✨';
                
                const userData = {
                    name: username,
                    nameLower: username.toLowerCase(),
                    bio: bio,
                    avatar: avatar,
                    online: true,
                    lastSeen: Date.now()
                };
                
                database.ref('users/' + userId).set(userData)
                    .then(() => {
                        database.ref('usernames/' + username.toLowerCase()).set(userId);
                        
                        currentUser = userId;
                        currentUserData = userData;
                        localStorage.setItem('currentUser', userId);
                        localStorage.setItem('userName', username);
                        localStorage.setItem('userBio', bio);
                        if (avatar) localStorage.setItem('userAvatar', avatar);
                        
                        document.getElementById('startScreen').style.display = 'none';
                        document.getElementById('mainChat').style.display = 'block';
                        
                        updateHeader();
                        loadChats();
                        setOnlineStatus(true);
                    });
            });
        }
        
        // Загрузка аватарки при регистрации
        document.getElementById('regAvatarUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('regAvatarPlaceholder').style.display = 'none';
                    document.getElementById('regAvatarImage').style.display = 'block';
                    document.getElementById('regAvatarImage').src = event.target.result;
                    localStorage.setItem('tempAvatar', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });
        
        function showError(msg) {
            document.getElementById('errorMessage').textContent = '❌ ' + msg;
        }
        
        // ========== ОНЛАЙН СТАТУС ==========
        function setOnlineStatus(online) {
            if (currentUser) {
                database.ref('users/' + currentUser + '/online').set(online);
                database.ref('users/' + currentUser + '/lastSeen').set(Date.now());
            }
        }
        
        // ========== ШАПКА ==========
        function updateHeader() {
            const name = localStorage.getItem('userName') || '...';
            const avatar = localStorage.getItem('userAvatar');
            
            document.getElementById('headerName').textContent = name;
            
            if (avatar) {
                document.getElementById('headerPlaceholder').style.display = 'none';
                document.getElementById('headerAvatarImage').style.display = 'block';
                document.getElementById('headerAvatarImage').src = avatar;
            }
        }
        
        // ========== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ==========
        function searchUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            
            if (!query) {
                resultsDiv.innerHTML = '';
                return;
            }
            
            database.ref('users').once('value', (snapshot) => {
                resultsDiv.innerHTML = '';
                const users = snapshot.val();
                
                for (let userId in users) {
                    if (userId === currentUser) continue;
                    
                    const user = users[userId];
                    if (user.name && user.name.toLowerCase().includes(query)) {
                        const div = document.createElement('div');
                        div.className = 'user-result';
                        div.onclick = () => startPrivateChat(userId, user);
                        
                        div.innerHTML = `
                            <div class="chat-avatar">
                                ${user.avatar ? '<img src="' + user.avatar + '">' : '<div class="placeholder">✦</div>'}
                            </div>
                            <div>
                                <div style="font-family: \'Press Start 2P\'; font-size: 10px;">${user.name}</div>
                                <div><span class="status-badge ${user.online ? 'status-online' : 'status-offline'}"></span>${user.online ? 'ОНЛАЙН' : 'БЫЛ(А) ' + new Date(user.lastSeen).toLocaleString()}</div>
                            </div>
                        `;
                        
                        resultsDiv.appendChild(div);
                    }
                }
            });
        }
        
        // ========== ЧАТЫ ==========
        function loadChats() {
            // Приватные чаты
            database.ref('users/' + currentUser + '/chats').on('value', (snapshot) => {
                const chats = snapshot.val() || {};
                displayPrivateChats(chats);
            });
            
            // Групповые чаты
            database.ref('users/' + currentUser + '/groupChats').on('value', (snapshot) => {
                const groups = snapshot.val() || {};
                displayGroupChats(groups);
            });
        }
        
        function displayPrivateChats(chats) {
            const container = document.getElementById('privateChats');
            container.innerHTML = '';
            
            for (let chatId in chats) {
                if (chats[chatId].type === 'group') continue;
                
                database.ref('chats/' + chatId).once('value', (snapshot) => {
                    const chat = snapshot.val();
                    if (!chat) return;
                    
                    const otherUserId = Object.keys(chat.participants || {}).find(id => id !== currentUser);
                    
                    database.ref('users/' + otherUserId).once('value', (userSnap) => {
                        const user = userSnap.val();
                        if (!user) return;
                        
                        const div = document.createElement('div');
                        div.className = 'chat-item' + (chatId === currentChatId ? ' active' : '');
                        div.onclick = () => openChat(chatId, 'private', otherUserId, user);
                        
                        const lastMessage = chat.lastMessage || '...';
                        
                        div.innerHTML = `
                            <div class="chat-avatar">
                                ${user.avatar ? '<img src="' + user.avatar + '">' : '<div class="placeholder">✦</div>'}
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">${user.name}</div>
                                <div class="chat-last">
                                    <span class="status-badge ${user.online ? 'status-online' : 'status-offline'}"></span>
                                    ${lastMessage}
                                </div>
                            </div>
                            <div class="chat-actions">
                                <span onclick="event.stopPropagation(); deleteChat('${chatId}', 'private')">🗑️</span>
                            </div>
                        `;
                        
                        container.appendChild(div);
                    });
                });
            }
        }
        
        function displayGroupChats(groups) {
            const container = document.getElementById('groupChats');
            container.innerHTML = '';
            
            for (let groupId in groups) {
                database.ref('groups/' + groupId).once('value', (snapshot) => {
                    const group = snapshot.val();
                    if (!group) return;
                    
                    const div = document.createElement('div');
                    div.className = 'chat-item' + (groupId === currentChatId ? ' active' : '');
                    div.onclick = () => openGroupChat(groupId, group);
                    
                    div.innerHTML = `
                        <div class="chat-avatar">
                            <div class="placeholder">#</div>
                        </div>
                        <div class="chat-info">
                            <div class="chat-name">${group.name}</div>
                            <div class="chat-last">
                                👥 ${Object.keys(group.members || {}).length} участников
                            </div>
                        </div>
                        <div class="chat-actions">
                            <span onclick="event.stopPropagation(); deleteChat('${groupId}', 'group')">🗑️</span>
                        </div>
                    `;
                    
                    container.appendChild(div);
                });
            }
        }
        
        // ========== УДАЛЕНИЕ ЧАТА ==========
        function deleteChat(chatId, type) {
            if (!confirm('Точно удалить этот чат?')) return;
            
            if (type === 'private') {
                // Удаляем только у себя
                database.ref('users/' + currentUser + '/chats/' + chatId).remove();
                // Если хочешь удалить у обоих - нужна доп логика
            } else {
                // Удаляем группу
                database.ref('users/' + currentUser + '/groupChats/' + chatId).remove();
                database.ref('groups/' + chatId + '/members/' + currentUser).remove();
            }
            
            if (currentChatId === chatId) {
                document.getElementById('messagesContainer').style.display = 'none';
                currentChatId = null;
            }
        }
